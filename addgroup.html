<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Music Group</title>

    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="page-layout">


    <header class="header">
        <div class="header-container">

            <div class="header-left">
                <h1 class="h1"><a href="../index.html">Add New Band</a></h1>
                <p>Fill out the details below to add a new music group.</p>
            </div>

            <nav class="menu">
                <a href="../index.html">Home</a>
                <a href="../bands.html">Bands</a>
                <a class="active" href="../addgroup.html">Add Group</a>

            </nav>

        </div>
    </header>


    <div class="detail-section">
        <div class="detail-container">

            <div class="detail-info">

                <form action="#" method="post" class="add-group-form">
                    <label for="band-name">Band Name:</label>
                    <input type="text" id="band-name" name="band-name" placeholder="Enter band name" required>

                    <label for="genre">Genre:</label>
                    <input type="text" id="genre" name="genre" placeholder="Enter genre" required>

                    <label for="members">Members:</label>
                    <textarea id="members" name="members" placeholder="Enter members separated by commas" rows="3"
                        required></textarea>

                    <label for="photo">Band Photo URL:</label>
                    <input type="text" id="photo" name="photo" placeholder="Enter image URL">

                    <div type="submit" class="btn">Add Band</div>
                </form>

            </div>

        </div>
    </div>


    <footer class="footer">
        <p>© 2026 Music Bands. All rights reserved. Created by Noshin Shukri.</p>
    </footer>

</body>

</html>
