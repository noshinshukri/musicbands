<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Music Group</title>

    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="page-layout">


    <header class="header">
        <div class="header-container">

            <div class="header-left">
                <h1 class="h1"><a href="../index.html">Add New Band</a></h1>
                <p>Fill out the details below to add a new music group.</p>
            </div>

            <nav class="menu">
                <a href="../index.html">Home</a>
                <a href="../bands2.html">Bands</a>
                <a class="active" href="../addgroup.html">Add Group</a>

            </nav>

        </div>
    </header>


    <div class="detail-section">
        <div class="detail-container">

            <div class="detail-info">

                <form id="band-form" class="add-group-form">
                    <label for="band-name">Band Name:</label>
                    <input type="text" id="band-name" name="band-name" placeholder="Enter band name" required>

                    <label for="genre">Genre:</label>
                    <input type="text" id="genre" name="genre" placeholder="Enter genre" required>

                    <label for="established">Year of establishment:</label>
                    <input type="text" id="established" name="established" placeholder="When did they establish?"
                        required>

                    <label for="description">Description:</label>
                    <textarea type="text" id="description" name="description" placeholder="Short description of the band" rows="4"
                        required></textarea>

                    <label for="albums">Total released albums:</label>
                    <input type="text" id="albums" name="album" placeholder="Enter amount" required>

                    <label for="members">Members:</label>
                    <textarea id="members" name="members" placeholder="Enter members separated by commas" rows="3"
                        required></textarea>

                    <label for="spotifyLink">Spotify-link</label>
                    <input type="url" id="spotifyLink" name="spotifyLink" placeholder="Add spotify-link">

                    <label for="imageLink">Band Photo:</label>
                    <input type="url" id="imageLink" name="imageLink" placeholder="Enter image URL">

                    <button type="submit" class="btn">Add Band</button>
                </form>

            </div>

        </div>
    </div>


    <footer class="footer">
        <p>© 2026 Music Bands. All rights reserved. Created by Noshin Shukri.</p>
    </footer>

    <script type="module" src="addgroup.js"></script>
</body>

</html>
